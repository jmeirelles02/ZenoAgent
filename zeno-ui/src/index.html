<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zeno System</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body, html {
        width: 100vw;
        height: 100vh;
        background-color: transparent;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: #00f3ff;
      }

      .zeno-hud-container {
        width: 800px;
        height: 720px;
        background-color: rgba(0, 10, 20, 0.9);
        border: 1px solid rgba(0, 243, 255, 0.15);
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-shadow:
          inset 0 0 30px rgba(0, 243, 255, 0.05),
          0 0 20px rgba(0, 243, 255, 0.1);
        -webkit-app-region: drag;
        user-select: none;
      }

      /* ── HEADER ── */
      .zeno-top-bar {
        width: 92%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 14px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(0, 243, 255, 0.1);
      }

      .zeno-title {
        font-size: 16px;
        letter-spacing: 8px;
        color: #bdf8ff;
        text-shadow: 0 0 8px rgba(0, 243, 255, 0.4);
      }

      .zeno-clock {
        font-size: 13px;
        color: rgba(189, 248, 255, 0.6);
        letter-spacing: 2px;
        font-variant-numeric: tabular-nums;
      }

      /* ── WINDOW CONTROLS (macOS) ── */
      .window-controls {
        display: flex;
        gap: 8px;
        -webkit-app-region: no-drag;
      }

      .win-btn {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.1s;
        opacity: 0.8;
      }

      .win-btn:hover { opacity: 1; transform: scale(1.15); }

      .win-btn-close {
        background-color: #ff5f57;
      }

      .win-btn-minimize {
        background-color: #febc2e;
      }

      /* ── MAIN AREA ── */
      .zeno-main {
        display: flex;
        width: 92%;
        flex: 1;
        gap: 14px;
        margin-top: 12px;
        overflow: hidden;
      }

      /* ── LEFT: REACTOR + METRICS ── */
      .zeno-left {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 220px;
        flex-shrink: 0;
      }

      .arc-reactor {
        position: relative;
        width: 180px;
        height: 180px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .ring { position: absolute; border-radius: 50%; }

      .outer-ring {
        width: 175px; height: 175px;
        border: 2px dashed rgba(0, 243, 255, 0.3);
        animation: spin 12s linear infinite;
      }

      .middle-ring {
        width: 135px; height: 135px;
        border: 2px solid rgba(0, 150, 255, 0.15);
        border-top-color: #00f3ff;
        border-bottom-color: #00f3ff;
        animation: spin-reverse 8s linear infinite;
      }

      .inner-ring {
        width: 100px; height: 100px;
        border: 2px dotted #00f3ff;
        animation: spin 5s linear infinite;
        transition: border-color 0.3s ease;
      }

      .core {
        width: 55px; height: 55px;
        border-radius: 50%;
        background: radial-gradient(circle, #fff 0%, #00f3ff 40%, rgba(0,150,255,0.6) 100%);
        box-shadow: 0 0 25px #00f3ff, 0 0 50px #00f3ff;
        animation: respirar 4s ease-in-out infinite;
        transition: background 0.3s, box-shadow 0.3s;
      }

      .core.agitada { animation: pensar 1.2s ease-in-out infinite; }
      .core.pulsando { animation: falar 0.6s ease-in-out infinite; }

      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes spin-reverse { to { transform: rotate(-360deg); } }

      /* Idle: respiração suave */
      @keyframes respirar {
        0%   { transform: scale(0.95); opacity: 0.85; box-shadow: 0 0 20px #00f3ff, 0 0 40px rgba(0,150,255,0.4); }
        50%  { transform: scale(1.05); opacity: 1;    box-shadow: 0 0 30px #00f3ff, 0 0 60px rgba(0,150,255,0.5); }
        100% { transform: scale(0.95); opacity: 0.85; box-shadow: 0 0 20px #00f3ff, 0 0 40px rgba(0,150,255,0.4); }
      }

      /* Thinking: pulsação rápida e energética */
      @keyframes pensar {
        0%   { transform: scale(1.0);  box-shadow: 0 0 25px #ffffff, 0 0 50px rgba(255,255,255,0.5); }
        25%  { transform: scale(1.12); box-shadow: 0 0 35px #ffffff, 0 0 70px rgba(255,255,255,0.6); }
        50%  { transform: scale(0.98); box-shadow: 0 0 20px #ffffff, 0 0 40px rgba(255,255,255,0.4); }
        75%  { transform: scale(1.08); box-shadow: 0 0 30px #ffffff, 0 0 60px rgba(255,255,255,0.5); }
        100% { transform: scale(1.0);  box-shadow: 0 0 25px #ffffff, 0 0 50px rgba(255,255,255,0.5); }
      }

      /* Speaking: pulso rítmico forte */
      @keyframes falar {
        0%   { transform: scale(1.0);  box-shadow: 0 0 25px #00f3ff, 0 0 50px #00f3ff; }
        30%  { transform: scale(1.18); box-shadow: 0 0 45px #00f3ff, 0 0 90px rgba(0,243,255,0.7); }
        60%  { transform: scale(1.02); box-shadow: 0 0 20px #00f3ff, 0 0 45px rgba(0,243,255,0.4); }
        100% { transform: scale(1.0);  box-shadow: 0 0 25px #00f3ff, 0 0 50px #00f3ff; }
      }

      /* ── SYSTEM METRICS ── */
      .metrics-panel {
        width: 100%;
        margin-top: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .metric-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 11px;
        color: rgba(189, 248, 255, 0.7);
      }

      .metric-label { letter-spacing: 1px; }

      .metric-bar-bg {
        width: 100px;
        height: 6px;
        background: rgba(0, 243, 255, 0.1);
        border-radius: 3px;
        overflow: hidden;
      }

      .metric-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #00f3ff, #0080ff);
        border-radius: 3px;
        transition: width 0.5s ease;
      }

      .metric-bar-fill.alerta {
        background: linear-gradient(90deg, #ff6b35, #ff2222);
      }

      .metric-value {
        width: 38px;
        text-align: right;
        font-variant-numeric: tabular-nums;
        color: #bdf8ff;
      }

      /* ── RIGHT: CHAT + STATUS ── */
      .zeno-right {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .chat-container {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 12px;
        background: rgba(0, 15, 30, 0.5);
        border: 1px solid rgba(0, 243, 255, 0.08);
        border-radius: 8px;
        -webkit-app-region: no-drag;
        user-select: text;
        cursor: default;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .chat-container::-webkit-scrollbar { width: 5px; }
      .chat-container::-webkit-scrollbar-track { background: transparent; }
      .chat-container::-webkit-scrollbar-thumb {
        background: rgba(0, 243, 255, 0.3);
        border-radius: 3px;
      }

      .msg {
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 13px;
        line-height: 1.5;
        word-wrap: break-word;
        overflow-wrap: break-word;
        max-width: 95%;
        animation: fadeIn 0.2s ease;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .msg-usuario {
        align-self: flex-end;
        background: rgba(0, 243, 255, 0.1);
        border: 1px solid rgba(0, 243, 255, 0.2);
        color: #bdf8ff;
      }

      .msg-zeno {
        align-self: flex-start;
        background: rgba(0, 60, 120, 0.15);
        border: 1px solid rgba(0, 100, 200, 0.15);
        color: rgba(189, 248, 255, 0.9);
      }

      .msg-tag {
        font-size: 10px;
        margin-bottom: 2px;
        letter-spacing: 2px;
        opacity: 0.5;
      }

      .chat-vazio {
        color: rgba(189, 248, 255, 0.3);
        font-size: 12px;
        text-align: center;
        margin-top: 40px;
        letter-spacing: 2px;
      }

      /* ── STATUS BAR ── */
      .zeno-status-bar {
        width: 92%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid rgba(0, 243, 255, 0.1);
      }

      .zeno-status {
        font-size: 11px;
        font-weight: bold;
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      /* ── INPUT ── */
      .input-area {
        display: flex;
        width: 92%;
        margin-top: 8px;
        margin-bottom: 14px;
        gap: 8px;
        -webkit-app-region: no-drag;
      }

      .input-texto {
        flex: 1;
        background-color: rgba(0, 20, 40, 0.8);
        border: 1px solid rgba(0, 243, 255, 0.3);
        border-radius: 8px;
        color: #bdf8ff;
        padding: 10px 14px;
        font-size: 13px;
        outline: none;
        transition: border-color 0.2s;
      }

      .input-texto:focus { border-color: #00f3ff; }

      .btn-acao {
        background-color: rgba(0, 20, 40, 0.8);
        border: 1px solid rgba(0, 243, 255, 0.3);
        border-radius: 8px;
        color: #00f3ff;
        padding: 10px 14px;
        cursor: pointer;
        font-size: 13px;
        font-weight: bold;
        transition: all 0.2s;
        -webkit-app-region: no-drag;
      }

      .btn-acao:hover {
        background-color: rgba(0, 243, 255, 0.15);
        border-color: #00f3ff;
      }
    </style>
  </head>
  <body>
    <div class="zeno-hud-container">

      <!-- TOP BAR -->
      <div class="zeno-top-bar">
        <div class="window-controls">
          <button class="win-btn win-btn-close" id="btn-close" title="Minimizar para bandeja"></button>
          <button class="win-btn win-btn-minimize" id="btn-minimize" title="Minimizar"></button>
        </div>
        <div class="zeno-title">ZENO</div>
        <div class="zeno-clock" id="clock">00:00:00</div>
      </div>

      <!-- MAIN AREA -->
      <div class="zeno-main">

        <!-- LEFT: Reactor + Metrics -->
        <div class="zeno-left">
          <div class="arc-reactor">
            <div class="ring outer-ring"></div>
            <div class="ring middle-ring"></div>
            <div class="ring inner-ring" id="inner-ring"></div>
            <div class="core" id="core-light"></div>
          </div>

          <div class="metrics-panel" id="metrics-panel">
            <div class="metric-row">
              <span class="metric-label">CPU</span>
              <div class="metric-bar-bg"><div class="metric-bar-fill" id="bar-cpu"></div></div>
              <span class="metric-value" id="val-cpu">--%</span>
            </div>
            <div class="metric-row">
              <span class="metric-label">RAM</span>
              <div class="metric-bar-bg"><div class="metric-bar-fill" id="bar-ram"></div></div>
              <span class="metric-value" id="val-ram">--%</span>
            </div>
            <div class="metric-row">
              <span class="metric-label">DISCO</span>
              <div class="metric-bar-bg"><div class="metric-bar-fill" id="bar-disco"></div></div>
              <span class="metric-value" id="val-disco">--%</span>
            </div>
            <div class="metric-row" id="row-bateria" style="display:none">
              <span class="metric-label">BAT</span>
              <div class="metric-bar-bg"><div class="metric-bar-fill" id="bar-bat"></div></div>
              <span class="metric-value" id="val-bat">--%</span>
            </div>
          </div>
        </div>

        <!-- RIGHT: Chat -->
        <div class="zeno-right">
          <div class="chat-container" id="chat-container">
            <div class="chat-vazio">Inicie uma conversa com o Zeno</div>
          </div>
        </div>
      </div>

      <!-- STATUS BAR -->
      <div class="zeno-status-bar">
        <div class="zeno-status" id="status-text">[ STANDBY ]</div>
      </div>

      <!-- INPUT -->
      <div class="input-area">
        <button class="btn-acao" id="btn-voz">🎙️</button>
        <input
          type="text"
          class="input-texto"
          id="input-texto"
          placeholder="Digite seu comando..."
          autocomplete="off"
        />
      </div>
    </div>

    <script>
      const statusText = document.getElementById("status-text");
      const coreLight = document.getElementById("core-light");
      const innerRing = document.getElementById("inner-ring");
      const inputTexto = document.getElementById("input-texto");
      const btnVoz = document.getElementById("btn-voz");
      const chatContainer = document.getElementById("chat-container");
      const clockEl = document.getElementById("clock");

      let zenoToken = "";
      let ultimoHistLen = 0;

      // ── TOKEN ──
      async function inicializarToken() {
        while (!zenoToken) {
          try {
            const resp = await fetch("http://localhost:5000/token");
            const dados = await resp.json();
            zenoToken = dados.token;
          } catch (e) {
            await new Promise(r => setTimeout(r, 2000));
          }
        }
      }
      inicializarToken();

      // ── CLOCK ──
      function atualizarRelogio() {
        const agora = new Date();
        clockEl.textContent = agora.toLocaleTimeString("pt-BR", { hour12: false });
      }
      setInterval(atualizarRelogio, 1000);
      atualizarRelogio();

      // ── WINDOW CONTROLS ──
      document.getElementById("btn-close").addEventListener("click", async () => {
        try {
          const { getCurrentWindow } = window.__TAURI__.window;
          await getCurrentWindow().hide();
        } catch (e) { console.error(e); }
      });

      document.getElementById("btn-minimize").addEventListener("click", async () => {
        try {
          const { getCurrentWindow } = window.__TAURI__.window;
          await getCurrentWindow().minimize();
        } catch (e) { console.error(e); }
      });

      // ── ENVIAR COMANDO ──
      async function enviarComando(texto) {
        if (!texto) return;
        inputTexto.value = "";
        try {
          await fetch("http://localhost:5000/enviar", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-Zeno-Token": zenoToken,
            },
            body: JSON.stringify({ comando: texto }),
          });
        } catch (e) {
          console.error(e);
        }
      }

      inputTexto.addEventListener("keypress", function (e) {
        if (e.key === "Enter") enviarComando(inputTexto.value);
      });

      btnVoz.addEventListener("click", function () {
        if (btnVoz.innerText === "PARAR") {
          enviarComando("[CANCELAR]");
        } else {
          enviarComando("[VOZ]");
        }
      });

      // ── RENDER CHAT ──
      function renderizarHistorico(historico) {
        if (historico.length === ultimoHistLen) return;
        ultimoHistLen = historico.length;

        chatContainer.innerHTML = "";

        if (historico.length === 0) {
          chatContainer.innerHTML = '<div class="chat-vazio">Inicie uma conversa com o Zeno</div>';
          return;
        }

        historico.forEach((msg) => {
          const div = document.createElement("div");
          const isUser = msg.papel === "usuario";
          div.className = `msg ${isUser ? "msg-usuario" : "msg-zeno"}`;

          const tag = document.createElement("div");
          tag.className = "msg-tag";
          tag.textContent = isUser ? "VOCÊ" : "ZENO";
          div.appendChild(tag);

          const txt = document.createElement("div");
          txt.textContent = msg.texto;
          div.appendChild(txt);

          chatContainer.appendChild(div);
        });

        requestAnimationFrame(() => {
          chatContainer.scrollTop = chatContainer.scrollHeight;
        });
      }

      // ── SYSTEM METRICS ──
      function atualizarMetrica(barId, valId, valor) {
        const bar = document.getElementById(barId);
        const val = document.getElementById(valId);
        if (!bar || !val) return;
        bar.style.width = valor + "%";
        val.textContent = valor + "%";
        if (valor > 85) {
          bar.classList.add("alerta");
        } else {
          bar.classList.remove("alerta");
        }
      }

      async function buscarMetricas() {
        try {
          const resp = await fetch("http://localhost:5000/sistema");
          const d = await resp.json();
          atualizarMetrica("bar-cpu", "val-cpu", Math.round(d.cpu));
          atualizarMetrica("bar-ram", "val-ram", Math.round(d.ram_usada));
          atualizarMetrica("bar-disco", "val-disco", Math.round(d.disco_usado));

          if (d.bateria !== null) {
            document.getElementById("row-bateria").style.display = "flex";
            atualizarMetrica("bar-bat", "val-bat", Math.round(d.bateria));
          }
        } catch (e) {}
      }
      setInterval(buscarMetricas, 3000);
      buscarMetricas();

      // ── CORE COLORS ──
      const temas = {
        online:   { cor: "#00f3ff", grad: "radial-gradient(circle, #fff 0%, #00f3ff 40%, rgba(0,150,255,0.6) 100%)" },
        ouvindo:  { cor: "#ffb700", grad: "radial-gradient(circle, #fff 0%, #ffb700 40%, rgba(255,150,0,0.6) 100%)" },
        pensando: { cor: "#ffffff", grad: "radial-gradient(circle, #fff 0%, #ddd 40%, rgba(255,255,255,0.6) 100%)" },
        falando:  { cor: "#00f3ff", grad: "radial-gradient(circle, #fff 0%, #00f3ff 40%, rgba(0,150,255,0.6) 100%)" },
        erro:     { cor: "red",     grad: "red" },
      };

      function aplicarTema(chave) {
        const t = temas[chave] || temas.online;
        coreLight.style.background = t.grad;
        coreLight.style.boxShadow = `0 0 25px ${t.cor}, 0 0 50px ${t.cor}`;
        innerRing.style.borderColor = t.cor;
        statusText.style.color = t.cor;
        btnVoz.style.color = t.cor;
        btnVoz.style.borderColor = `rgba(${t.cor === '#00f3ff' ? '0,243,255' : t.cor === '#ffb700' ? '255,183,0' : '255,255,255'}, 0.3)`;
      }

      // ── WINDOW CONTROL ──
      let janelaOculta = false;

      async function esconderJanela() {
        if (janelaOculta) return;
        try {
          const { getCurrentWindow } = window.__TAURI__.window;
          await getCurrentWindow().hide();
          janelaOculta = true;
        } catch (e) { console.error("Erro ao esconder janela:", e); }
      }

      async function mostrarJanela() {
        if (!janelaOculta) return;
        try {
          const { getCurrentWindow } = window.__TAURI__.window;
          await getCurrentWindow().show();
          await getCurrentWindow().setFocus();
          janelaOculta = false;
        } catch (e) { console.error("Erro ao mostrar janela:", e); }
      }

      // ── POLLING ──
      setInterval(async () => {
        try {
          const resp = await fetch("http://localhost:5000/estado");
          const dados = await resp.json();

          statusText.innerText = `[ ${dados.status} ]`;
          renderizarHistorico(dados.historico || []);

          const s = dados.status;

          coreLight.classList.remove("agitada", "pulsando");

          if (s === "FALANDO...") {
            coreLight.classList.add("pulsando");
            aplicarTema("falando");
            btnVoz.innerText = "PARAR";
          } else if (s === "OUVINDO...") {
            aplicarTema("ouvindo");
            btnVoz.innerText = "PARAR";
          } else if (s === "PENSANDO..." || s === "BUSCANDO NA REDE..." || s === "RECUPERANDO DADOS...") {
            coreLight.classList.add("agitada");
            aplicarTema("pensando");
            btnVoz.innerText = "PARAR";
          } else {
            aplicarTema("online");
            btnVoz.innerText = "🎙️";
          }
        } catch (e) {
          statusText.innerText = "[ SINAL PERDIDO ]";
          aplicarTema("erro");
          coreLight.classList.remove("agitada", "pulsando");
        }
      }, 500);
    </script>
  </body>
</html>
